@if (totalPages() > 1) {
      <nav class="flex items-center justify-center gap-1">
        <!-- Previous -->
        <button (click)="goTo(currentPage() - 1)" [disabled]="currentPage() === 1"
                class="btn-secondary px-3 py-1.5 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        @for (page of visiblePages(); track page) {
          @if (page === -1) {
            <span class="px-2 text-gray-400">...</span>
          } @else {
            <button (click)="goTo(page)"
                    [class]="page === currentPage() ? 'btn-primary px-3 py-1.5 text-sm' : 'btn-secondary px-3 py-1.5 text-sm'">
              {{ page }}
            </button>
          }
        }

        <!-- Next -->
        <button (click)="goTo(currentPage() + 1)" [disabled]="currentPage() === totalPages()"
                class="btn-secondary px-3 py-1.5 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </nav>
    }
