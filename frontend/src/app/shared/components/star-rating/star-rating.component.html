<div class="flex items-center" [class.gap-0.5]="!small()" [class.gap-px]="small()">
      @for (star of stars; track star) {
        @if (interactive()) {
          <button (click)="ratingChange.emit(star)" class="cursor-pointer bg-transparent border-0 p-0 focus:outline-none"
                  [class.text-yellow-400]="star <= currentRating()" [class.text-gray-300]="star > currentRating()">
            <svg [class.w-5]="!small()" [class.h-5]="!small()" [class.w-3.5]="small()" [class.h-3.5]="small()" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
          </button>
        } @else {
          <svg [class.w-4]="!small()" [class.h-4]="!small()" [class.w-3]="small()" [class.h-3]="small()"
               fill="currentColor" viewBox="0 0 20 20"
               [class.text-yellow-400]="star <= rating()" [class.text-gray-300]="star > rating()">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        }
      }
    </div>
