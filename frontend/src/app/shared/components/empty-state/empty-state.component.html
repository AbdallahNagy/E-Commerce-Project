<div class="flex flex-col items-center justify-center py-16 text-center">
      <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
        <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="iconPath()" />
        </svg>
      </div>
      <h3 class="text-lg font-medium text-gray-900 mb-1">{{ title() }}</h3>
      <p class="text-sm text-gray-500 mb-6 max-w-sm">{{ message() }}</p>
      @if (actionLink() && actionText()) {
        <a [routerLink]="actionLink()" class="btn-primary no-underline">{{ actionText() }}</a>
      }
    </div>
