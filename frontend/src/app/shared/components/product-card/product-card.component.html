<a [routerLink]="['/products', product()._id]" class="card group block hover:shadow-md transition-shadow duration-200 no-underline">
      <!-- Image -->
      <div class="aspect-square bg-gray-100 relative overflow-hidden">
        @if (product().images.length) {
          <img [src]="product().images[0]" [alt]="product().name"
               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        } @else {
          <div class="w-full h-full flex items-center justify-center text-gray-300">
            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
        }
        @if (product().stock === 0) {
          <div class="absolute top-2 right-2 badge-red">Out of Stock</div>
        }
      </div>

      <!-- Info -->
      <div class="p-4">
        <h3 class="font-medium text-gray-900 text-sm line-clamp-2 mb-1 group-hover:text-primary-600 transition-colors">
          {{ product().name }}
        </h3>
        <div class="flex items-center gap-1 mb-2">
          <app-star-rating [rating]="product().averageRating" [small]="true" />
          <span class="text-xs text-gray-400">({{ product().numReviews }})</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-lg font-bold text-gray-900">${{ product().price.toFixed(2) }}</span>
        </div>
      </div>
    </a>
