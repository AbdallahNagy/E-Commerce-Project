<div class="fixed top-20 right-4 z-[100] flex flex-col gap-2 max-w-sm">
      @for (toast of toastService.toasts(); track toast.id) {
        <div class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border animate-slide-in"
             [class]="getClass(toast.type)">
          <span class="text-sm font-medium flex-1">{{ toast.message }}</span>
          <button (click)="toastService.dismiss(toast.id)" class="text-current opacity-60 hover:opacity-100 cursor-pointer bg-transparent border-0 p-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      }
    </div>
